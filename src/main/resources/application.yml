spring:
  application:
    name: lotto-pattern-generator

  mvc:
    view:
      prefix: /WEB-INF/views/
      suffix: .jsp

  h2:
    console:
      enabled: true
      path: /h2-console

  datasource:
    url: jdbc:h2:file:./data/lotto-db;MODE=MySQL;DATABASE_TO_LOWER=TRUE;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

app:
  lotto:
    seed-csv: data/winning-numbers.csv
    auto-update:
      enabled: true
